# Docker Compose Configuration for Scrapegoat
# AIO (All-In-One) - Includes All Dependencies
#
# Self-contained deployment with:
# - PostgreSQL 17 with pgvector extension
# - Text-Embeddings-Inference (OpenAI-compatible embedding API)
# - Scrapegoat services (worker, mcp, web)
# - Crawl4AI (optional)
#
# No external dependencies required.
#
# Configuration:
# 1. Copy .env.aio.example to .env
# 2. Edit .env with desired passwords
# 3. Run: docker compose -f docker-compose.aio.yml up -d
#

services:
  # PostgreSQL 17 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: scrapegoat-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-scrapegoat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-scrapegoat}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - scrapegoat-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrapegoat} -d ${POSTGRES_DB:-scrapegoat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    labels:
      - "com.scrapegoat.service=postgres"
      - "com.scrapegoat.config=aio"

  # Text-Embeddings-Inference - OpenAI-compatible embedding API
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.8-cpu
    container_name: scrapegoat-embeddings
    restart: unless-stopped
    network_mode: host
    command:
      - --model-id
      - sentence-transformers/all-MiniLM-L6-v2
      - --port
      - "8082"
      - --hostname
      - "0.0.0.0"
      - --max-concurrent-requests
      - "32"
      - --max-batch-tokens
      - "16384"
    volumes:
      - scrapegoat-embeddings-cache:/data
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Allow time for model download on first start
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "com.scrapegoat.service=embeddings"
      - "com.scrapegoat.config=aio"

  # Worker service - handles documentation processing and API
  worker:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      # Database configuration
      - DATABASE_URL=postgresql://${POSTGRES_USER:-scrapegoat}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB:-scrapegoat}
      # Embedding API configuration (OpenAI-compatible endpoint)
      - OPENAI_API_BASE=http://localhost:8082/v1
      - OPENAI_API_KEY=not-required  # TEI doesn't require API key
      - DOCS_MCP_EMBEDDING_MODEL=text-embeddings-inference
      # Crawl4AI configuration
      - CRAWL4AI_ENABLED=${CRAWL4AI_ENABLED:-false}
      - CRAWL4AI_SERVICE_URL=${CRAWL4AI_SERVICE_URL:-http://localhost:8001}
      # Application settings
      - DOCS_MCP_STORE_PATH=/data
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - scrapegoat-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "com.scrapegoat.service=worker"
      - "com.scrapegoat.config=aio"

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=6280
      - HOST=0.0.0.0
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "com.scrapegoat.service=mcp"
      - "com.scrapegoat.config=aio"

  # Web interface - provides browser-based management
  web:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      [
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "6281",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=6281
      - HOST=0.0.0.0
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "com.scrapegoat.service=web"
      - "com.scrapegoat.config=aio"

  # Crawl4AI service - AI-optimized web crawling with Playwright
  # Optional: Set CRAWL4AI_ENABLED=true in .env to enable
  crawl4ai:
    build:
      context: ../../services/crawl4ai
      dockerfile: Dockerfile
    image: scrapegoat-crawl4ai:latest
    container_name: scrapegoat-crawl4ai
    restart: unless-stopped
    network_mode: host
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - VERBOSE=${CRAWL4AI_VERBOSE:-false}
      - HEADLESS=${CRAWL4AI_HEADLESS:-true}
      - MAX_CONCURRENT_CRAWLS=${CRAWL4AI_MAX_CONCURRENT:-5}
      - REQUEST_TIMEOUT=${CRAWL4AI_TIMEOUT:-30}
    # Playwright/Chromium requires increased shared memory and privileged mode in Proxmox
    shm_size: 2gb
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "com.scrapegoat.service=crawl4ai"
      - "com.scrapegoat.config=aio"
    profiles:
      - crawl4ai  # Only start if --profile crawl4ai specified

# Named volumes for data persistence
volumes:
  scrapegoat-postgres-data:
    name: scrapegoat-postgres-data
    labels:
      - "com.scrapegoat.volume=postgres"
      - "com.scrapegoat.config=aio"

  scrapegoat-embeddings-cache:
    name: scrapegoat-embeddings-cache
    labels:
      - "com.scrapegoat.volume=embeddings"
      - "com.scrapegoat.config=aio"

  scrapegoat-data:
    name: scrapegoat-data
    labels:
      - "com.scrapegoat.volume=data"

# Networks: Using host mode for Proxmox VE compatibility
# No custom networks defined - all services use host networking
#
# Port Allocation:
# - PostgreSQL: 5432 (internal only)
# - Embeddings: 8082 (internal only)
# - Worker API: 8080
# - MCP Server: 6280
# - Web UI: 6281
# - Crawl4AI: 8001 (if enabled)
