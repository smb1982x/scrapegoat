# Docker Compose configuration for building Scrapegoat from source
#
# This setup builds containers from local source code:
# - scrapegoat: Main service with MCP, API, and WebUI
# - crawl4ai: AI-optimized web crawling service
#
# Usage:
#   docker compose -f docker-compose-build-containers.yml up -d --build
#
services:
  scrapegoat:
    build:
      context: .
      dockerfile: Dockerfile
    image: git.fenrirsden.org/mcp/scrapegoat:latest
    container_name: scrapegoat
    network_mode: host

  crawl4ai:
    build:
      context: ./services/crawl4ai
# Change to;
# CPU - Dockerfile.cpu
# nVIDIA GPU CUDA 12.8 - Dockerfile.cu128
# nVIDIA GPU CUDA 13.1 - Dockerfile.cu131
#      dockerfile: Dockerfile.cu128
      dockerfile: Dockerfile
    image: git.fenrirsden.org/mcp/scrapegoat-crawl4ai:latest
    container_name: scrapegoat-crawl4ai
    network_mode: host
