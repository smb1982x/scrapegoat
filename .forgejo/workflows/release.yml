name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/scrapegoat-${{ github.ref_name }}.tar.gz dist

      - name: Create Release
        run: |
          curl -X POST \
            -H "Authorization: Bearer 6765434e2da6214fb260db6c3d192554ae7dc536" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"Release ${{ github.ref_name }}\", \"body\": \"MCP server release\"}" \
            https://git.phrk.org/api/v1/repos/pub/scrapegoat/releases
