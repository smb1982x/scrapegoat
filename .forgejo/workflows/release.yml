name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/scrapegoat-${{ github.ref_name }}.tar.gz dist

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.PHRK_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -F "tag=${{ github.ref_name }}" \
            -F "name=Release ${{ github.ref_name }}" \
            -F "note=MCP server release" \
            -F "file=@dist/scrapegoat-${{ github.ref_name }}.tar.gz" \
            https://git.phrk.org/api/v1/repos/pub/scrapegoat/releases
