# ============================================================================
# Scrapegoat Docker Compose - BYO PostgreSQL Mode
# ============================================================================
# Use your own PostgreSQL and embeddings services
#
# Quick Start:
#   1. cp .env.byo-postgres.example .env
#   2. Edit .env - set DATABASE_URL and embeddings config
#   3. docker compose -f docker-compose.byo-postgres.yml up -d
#
# Services:
#   - Worker API (port 8080)
#   - MCP Server (port 6280)
#   - Web UI (port 80)
#   - Crawl4AI (port 8001, internal)
#
# Requirements:
#   - External PostgreSQL 14+ with pgvector
#   - External embeddings API (embed.den.lan with Jina-Embedding-v3)
# ============================================================================

services:
  # Worker service - handles documentation processing and API
  worker:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://embed.den.lan/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-required}
      - DOCS_MCP_EMBEDDING_MODEL=${DOCS_MCP_EMBEDDING_MODEL:-Jina-Embedding-v3}
      - CRAWL4AI_ENABLED=true
      - CRAWL4AI_SERVICE_URL=${CRAWL4AI_SERVICE_URL:-http://localhost:8001}
      - DOCS_MCP_STORE_PATH=/data
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - scrapegoat-data:/data
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "com.scrapegoat.service=worker"
      - "com.scrapegoat.config=byo"

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=6280
      - HOST=0.0.0.0
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "com.scrapegoat.service=mcp"
      - "com.scrapegoat.config=byo"

  # Web interface - provides browser-based management
  # MODIFIED: Port 80 for direct HTTP access at http://scrapegoat.den.lan/
  web:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=80
      - HOST=0.0.0.0
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "com.scrapegoat.service=web"
      - "com.scrapegoat.config=byo"

  # Crawl4AI service - AI-optimized web crawling with Playwright
  # MODIFIED: Always enabled (no profile required)
  crawl4ai:
    build:
      context: ./services/crawl4ai
      dockerfile: Dockerfile
    image: scrapegoat-crawl4ai:latest
    container_name: scrapegoat-crawl4ai
    restart: unless-stopped
    network_mode: host
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - VERBOSE=${CRAWL4AI_VERBOSE:-false}
      - HEADLESS=${CRAWL4AI_HEADLESS:-true}
      - MAX_CONCURRENT_CRAWLS=${CRAWL4AI_MAX_CONCURRENT:-5}
      - REQUEST_TIMEOUT=${CRAWL4AI_TIMEOUT:-30}
    # Playwright/Chromium requires increased shared memory and privileged mode
    shm_size: 2gb
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "com.scrapegoat.service=crawl4ai"
      - "com.scrapegoat.config=byo"

# Named volumes for data persistence
volumes:
  scrapegoat-data:
    name: scrapegoat-data
    labels:
      - "com.scrapegoat.volume=data"

# Networks: Using host mode for Debian 12 LXC compatibility
# No custom networks defined - all services use host networking
