# Docker Compose configuration for Docs MCP Server
#
# Scaling setup with separate services:
# - worker: Handles documentation processing
# - mcp: MCP server endpoint for AI tools
# - web: Web interface for management
#
services:
  # Worker service - handles the actual documentation processing
  worker:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - docs-mcp-data:/data
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Web interface - provides browser-based management
  web:
    image: ghcr.io/denmaster/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "6281",
        "--server-url",
        "http://localhost:8080/api",
      ]
    container_name: scrapegoat-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Crawl4AI service - AI-optimized web crawling with BM25-filtered markdown
  crawl4ai:
    build:
      context: ./services/crawl4ai
      dockerfile: Dockerfile
    image: scrapegoat-crawl4ai:latest
    container_name: scrapegoat-crawl4ai
    restart: unless-stopped
    network_mode: host
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - VERBOSE=false
      - HEADLESS=true
      - MAX_CONCURRENT_CRAWLS=5
      - REQUEST_TIMEOUT=30
    # Playwright/Chromium requires increased shared memory and privileged mode in Proxmox
    shm_size: 2gb
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  docs-mcp-data:
    name: docs-mcp-data
