# Scrapegoat - MCP Documentation Server
#
# Quick Start:
#   1. cp .env.example .env
#   2. Edit DATABASE_URL in .env
#   3. Edit OPENAI_API_KEY (or other provider) in .env
#   4. docker compose up -d
#
# For dedicated PostgreSQL: Uncomment the 'postgres' service below

services:
  scrapegoat:
    image: git.fenrirsden.org/mcp/scrapegoat:latest
    container_name: scrapegoat
    command: ["--protocol", "http"]
    network: host
    environment:
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-scrapegoat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scrapegoat}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-scrapegoat}
      - SCRAPEGOAT_PORT=${SCRAPEGOAT_PORT:-8080}
      - DATABASE_URL=${DATABASE_URL:-postgresql://$POSTGRES_USERNAME:$POSTGRES_PASSWORD@localhost:5432/$POSTGRES_DATABASE}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-your-openai-api-key-here}
      - DOCS_MCP_EMBEDDING_MODEL=${DOCS_MCP_EMBEDDING_MODEL:-openai:text-embedding-3-small}
      - VECTOR_DIMENSION=${VECTOR_DIMENSION:-1024}
      - DOCS_MCP_STORE_PATH=${DOCS_MCP_STORE_PATH:-/data}
      - CRAWL4AI_SERVICE_URL=${CRAWL4AI_SERVICE_URL:-http://localhost:$CRAWL4AI_PORT}
      - NODE_ENV=${NODE_ENV:-production}
      - RERANK_ENABLED=${RERANK_ENABLED:-false}
      - RERANK_API_BASE=${RERANK_API_BASE:-https://api.openai.com/v1}
      - RERANK_MODEL=${RERANK_MODEL:-openai:GPT-4o-mini}
      - RERANK_TIMEOUT=${RERANK_TIMEOUT:-5000}
    volumes:
      - ./data:/data
    depends_on:
      crawl4ai:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${SCRAPEGOAT_PORT}/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  crawl4ai:
    image: git.fenrirsden.org/mcp/scrapegoat-crawl4ai:latest
    container_name: scrapegoat-crawl4ai
    network: host
    environment:
      - CRAWL4AI_PORT=${CRAWL4AI_PORT:-8001}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CRAWL4AI_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ═══════════════════════════════════════════════════════════════════════════
# OPTIONAL: Dedicated PostgreSQL Database
# ═══════════════════════════════════════════════════════════════════════════
# Uncomment this section and the depends_on lines above to deploy a dedicated
# PostgreSQL database for Scrapegoat.
#
# When using this PostgreSQL:
#   1. Comment out the DATABASE_URL line in scrapegoat environment
#   2. Uncomment the DATABASE_URL line below (hardcoded connection)
#   3. Uncomment depends_on: [postgres] in scrapegoat service
#   4. Set POSTGRES_* env var or change the default below!
#
# postgres:
#   image: postgres:16-alpine
#   container_name: scrapegoat-postgres
#   network: host
#   environment:
#     - POSTGRES_USERNAME=${POSTGRES_USERNAME:-scrapegoat}
#     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scrapegoat}
#     - POSTGRES_DATABASE=${POSTGRES_DATABASE:-scrapegoat}
#   volumes:
#     - scrapegoat-pgdata:/var/lib/postgresql/data
#   restart: unless-stopped
#   healthcheck:
#     test: ["CMD-SHELL", "pg_isready -U scrapegoat -d scrapegoat"]
#     interval: 5s
#     timeout: 5s
#     retries: 5
#
# Then in the scrapegoat service above, replace:
#   - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
# With:
#   - DATABASE_URL=postgresql://scrapegoat:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/scrapegoat
# NOTE: Password must match POSTGRES_PASSWORD set in postgres service above
# And add:
#   depends_on:
#     postgres:
#       condition: service_healthy
#
# volumes:
#   scrapegoat-pgdata:
